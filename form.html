<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Замовлення</title>
    <style>
      body {
        background: linear-gradient(to top, #33c43a 20%, #3248FF 100%);
        min-height: 100vh;
        margin: 0;
        padding: 10px;
        background-color: #33c43a;
        font-family: sans-serif;
        color: #ffffff;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 1200px;
        margin: 0 auto 30px auto;
        padding: 10px 20px;
      }

      .logo-link {
        text-decoration: none;
      }

      .back-button {
        text-decoration: none;
        color: #1eff00;
        background-color: rgb(0, 0, 0);
        padding: 12px 25px;
        border-radius: 8px;
        font-weight: bold;
        transition: background 0.3s;
      }

      .back-button:hover {
        background-color: #111;
        box-shadow: 0 0 10px rgba(86, 255, 110, 0.4);
      }

      .form-container {
        background-color: #171d28;
        border: 1px solid #212b3d;
        border-radius: 8px;
        max-width: 600px;
        margin: 40px auto;
        padding: 30px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }

      .form-container:hover {
        border-color: #56FF6E;
        box-shadow: 0 5px 20px rgba(86, 255, 110, 0.15);
      }

      h1 {
        text-align: center;
        color: #ffffff;
        margin-top: 0;
        margin-bottom: 25px;
        font-size: 24px;
        border-bottom: 2px solid #212b3d;
        padding-bottom: 15px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 14px;
        color: #96a7bc;
        margin-bottom: 8px;
        font-weight: 500;
      }

      input[type="text"],
      input[type="email"],
      select {
        width: 100%;
        padding: 12px;
        background-color: #10141d;
        border: 1px solid #212b3d;
        border-radius: 4px;
        color: white;
        font-size: 15px;
        box-sizing: border-box;
        transition: border-color 0.2s;
      }

      input[type="text"]:focus,
      input[type="email"]:focus,
      select:focus {
        outline: none;
        border-color: #56FF6E;
      }

      .price-summary {
        background-color: #10141d;
        padding: 15px;
        border-radius: 4px;
        margin-top: 25px;
        margin-bottom: 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-left: 4px solid #56FF6E;
      }

      .price-label {
        font-size: 16px;
        color: #96a7bc;
      }

      .price-value {
        font-size: 20px;
        font-weight: bold;
        color: #beee11;
      }

      .submit-button {
        width: 100%;
        background: linear-gradient(to right, #47b230 0%, #5cba42 100%);
        color: #ffffff;
        border: none;
        padding: 15px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
      }

      .submit-button:hover {
        background: linear-gradient(to right, #51ca37 0%, #6ade4f 100%);
        box-shadow: 0 0 15px rgba(86, 255, 110, 0.3);
      }

      .submit-button:active {
        transform: scale(0.99);
      }

      footer h2 {
        text-align: center;
        color: azure;
        margin-top: 40px;
        font-size: 16px;
        opacity: 0.8;
      }

      @media (max-width: 768px) {
        header {
          flex-direction: column;
          gap: 15px;
          text-align: center;
        }
        .form-container {
          margin: 10px;
          padding: 20px;
        }
      }
       .purple-button {
        text-decoration: none;
        color: black;
        padding: 20px 35px;
        background-color: rgba(0, 128, 0, 0.541);
        border-radius: 8px;
        transition: all 0.4s;
        display: inline-block;
        font-size: 27px;
      }
      .purple-button:hover {
        background-color: #36a73d;
      }
    </style>
  </head>
  <body>

    <header>
      <a href="index.html" class="logo-link">
        <img src="Simtea.png" width="200" alt="SIMBE Corporation" onerror="this.style.display='none'">
      </a>
      <a href="index.html" class="purple-button">←</a>
    </header>

    <main>
      <div class="form-container">
        <h1>Оформлення замовлення</h1>
        
        <form id="order-form">
          <div class="form-group">
            <label for="game-select">Оберіть гру</label>
            <select id="game-select" required>
              <option value="" disabled selected>Виберіть гру зі списку</option>
              <option value="299" data-name="Rust">Rust = 299₴</option>
              <option value="2299" data-name="Forza Horizon 6">Forza Horizon 6 = 2299₴</option>
              <option value="74" data-name="Voxel Tanks">Voxel Tanks = 74₴</option>
              <option value="899" data-name="Subnautica 2">Subnautica 2 = 899₴</option>
              <option value="299" data-name="Euro Truck Simulator 2">Euro Truck Simulator 2 = 299₴</option>
            </select>
          </div>

          <div class="form-group">
            <label for="email">Електронна пошта для чеку</label>
            <input type="email" id="email" placeholder="yourmail@example.com" required>
          </div>

          <div class="form-group">
            <label for="payment-method">Спосіб оплати</label>
            <select id="payment-method" required>
              <option value="wallet">💳 Simtea гаманець</option>
              <option value="card">Банківська картка</option>
            </select>
          </div>

          <div class="price-summary">
            <span class="price-label">Всього до сплати:</span>
            <span class="price-value" id="total-price">0 ₴</span>
          </div>

          <button type="submit" class="submit-button">Підтвердити замовлення</button>
        </form>
      </div>
    </main>

    <footer>
      <h2>SIMBE Corporation</h2>
    </footer>

    <script>
      const gameSelect = document.getElementById('game-select');
      const totalPriceDisplay = document.getElementById('total-price');

      gameSelect.addEventListener('change', function() {
        const price = this.value;
        if(price) {
 
          totalPriceDisplay.textContent = Number(price).toLocaleString('uk-UA') + ' ₴';
        } else {
          totalPriceDisplay.textContent = '0 ₴';
        }
      });

      document.getElementById('order-form').addEventListener('submit', function(event) {
        event.preventDefault();
        
        const selectedGame = gameSelect.options[gameSelect.selectedIndex].getAttribute('data-name');
        const paymentMethod = document.getElementById('payment-method').options[document.getElementById('payment-method').selectedIndex].text;
        
        alert(`Дякую!\nГра успішно придбана.`);
      });
    </script>
  </body>
</html>
