<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профіль</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
              background: linear-gradient(to top, #33c43a 20%, #3248FF 100%);
        min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
        }

        .header {
            width: 100%;
            max-width: 1600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .back-btn {
            background-color: #33c43a;
            color: #000000;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: scale(1.05);
        }

        .logo-container {
            text-align: center;
        }

        .logo-title {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .logo-sub {
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .profile-container {
            background-color: rgba(26, 32, 44, 0.85);
            border-radius: 24px;
            padding: 50px;
            max-width: 1600px;
            width: 100%;
            flex-grow: 1;
            display: flex;
            gap: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .profile-sidebar {
            flex: 1;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .avatar-container {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid #21a76e;
            box-shadow: 0 0 25px rgba(33, 167, 110, 0.5);
            margin-bottom: 25px;
            overflow: hidden;
            background-color: #1a202c;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
        }

        .username {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        .status {
            font-size: 1.1rem;
            color: #ecc94b;
            margin-bottom: 30px;
            text-align: center;
            font-style: italic;
        }

        .stats-box {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 1.1rem;
        }

        .stat-val {
            font-weight: bold;
            color: #48bb78;
        }

        .profile-content {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .section-title {
            font-size: 2rem;
            font-weight: bold;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .games-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .game-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            transition: transform 0.2s;
        }

        .game-item:hover {
            transform: translateX(5px);
            background-color: rgba(255, 255, 255, 0.08);
        }

        .game-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .game-name {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .game-meta {
            font-size: 1rem;
            color: #a0aec0;
        }

        .play-btn {
            background-color: #21a76e;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .play-btn:hover {
            background-color: #1c8e5c;
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .header {
                flex-direction: column-reverse; 
                gap: 15px;
                margin-bottom: 25px;
            }

            .back-btn {
                width: 100%;
                text-align: center;
                padding: 12px;
            }

            .logo-title {
                font-size: 2.2rem;
            }

            .profile-container {
                flex-direction: column; 
                gap: 30px;
                padding: 20px;
                border-radius: 16px;
            }

            .profile-sidebar {
                max-width: 100%;
                padding: 20px;
            }

            .avatar-container {
                width: 150px;
                height: 150px;
                font-size: 4rem;
            }

            .username {
                font-size: 2rem;
            }

            .section-title {
                font-size: 1.6rem;
                text-align: center;
            }

            .game-item {
                flex-direction: column; 
                gap: 15px;
                text-align: center;
                padding: 15px;
            }


            .play-btn {
                width: 100%; 
            }
   
        }
                       .purple-button {
        text-decoration: none;
        color: black;
        padding: 20px 35px;
        background-color: rgba(0, 128, 0, 0.541);
        border-radius: 8px;
        transition: all 0.4s;
        display: inline-block;
        font-size: 27px;
      }
      .purple-button:hover {
        background-color: #36a73d;
      }
        div42{
            position: absolute;
            top: 20px;
            left: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="purple-button">←</a>
        <div class="logo-container">
            <div class="logo-title">Simtea</div>
        </div>
        <div style="width: 140px;" class="desktop-spacer"></div>
    </div>

    <div class="profile-container">
        <div class="profile-sidebar">
            <div class="avatar-container">🐱</div>
            <div class="username">Ти</div>
            <div class="status">Власник безкінечного балансу 💰</div>
            
            <div class="stats-box">
                <div class="stat-item">
                    <span>Баланс:</span>
                    <span class="stat-val">∞ ₴</span>
                </div>
                <div class="stat-item">
                    <span>Ігор у бібліотеці:</span>
                    <span class="stat-val">3</span>
                </div>
                <div class="stat-item">
                    <span>Час у грі:</span>
                    <span class="stat-val">142 год.</span>
                </div>
            </div>
        </div>

        <div class="profile-content">
            <div>
                <div class="section-title">Друзі</div>
                <div class="games-list">
                    <div class="game-item">
                        <div class="game-info">
                            <div class="game-name">Саша</div>
                            <div class="game-meta">Не в мережі</div>
                        </div>
                        <button class="play-btn">Написати</button>
                    </div>
                    <div class="game-item">
                        <div class="game-info">
                            <div class="game-name">Катя</div>
                            <div class="game-meta">Грає в Team Fortress 2</div>
                        </div>
                        <button class="play-btn">Написати</button>
                    </div>
                    <div class="game-item">
                        <div class="game-info">
                            <div class="game-name">Володимир</div>
                            <div class="game-meta">В мережі</div>
                        </div>
                        <button class="play-btn">Написати</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
